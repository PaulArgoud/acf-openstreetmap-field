name: CI

on:
  push:
    branches: [ master ]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    name: Lint (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [ '8.0', '8.5' ]
    steps:
      - uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer, cs2pr
          coverage: none

      - name: Install Composer dependencies
        run: |
          tries=0
          until composer install --no-interaction --no-progress --prefer-dist; do
            tries=$((tries+1))
            [ $tries -ge 3 ] && exit 1
            echo "composer install failed; retrying in 15s ($tries/3)…"
            sleep 15
          done

      - name: phpcs (errors only; warnings are informational)
        run: vendor/bin/phpcs -q -n --report=checkstyle --standard=phpcs.ruleset.xml . | cs2pr

  build:
    name: Build assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Build CSS & JS
        run: |
          npx sass ./src/scss/:./assets/css/ --load-path=node_modules/ --style=compressed --no-source-map
          npx webpack build --output-path ./assets/js --config ./webpack.config.js --mode production

      - name: Fail if the build changed committed assets
        run: |
          git diff --exit-code -- assets \
            || ( echo "::error::Built assets differ from committed ones. Run 'npm run build' and commit." && exit 1 )

  test:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.0', '8.5' ]
    services:
      mysql:
        image: mariadb:lts
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s --health-timeout=5s --health-retries=10
    steps:
      - uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli, zip
          tools: composer
          coverage: none

      - name: Install subversion (for the WP test library)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends subversion

      - name: Install Composer dependencies
        run: |
          tries=0
          until composer install --no-interaction --no-progress --prefer-dist; do
            tries=$((tries+1))
            [ $tries -ge 3 ] && exit 1
            echo "composer install failed; retrying in 15s ($tries/3)…"
            sleep 15
          done

      - name: Install the WordPress test suite (WP 7.0)
        run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 7.0 true

      - name: Install Secure Custom Fields into the test site
        run: |
          curl -sL https://downloads.wordpress.org/plugin/secure-custom-fields.zip -o /tmp/scf.zip
          unzip -q /tmp/scf.zip -d /tmp/wordpress/wp-content/plugins/

      - name: PHPUnit
        run: vendor/bin/phpunit
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
