name: CI

on:
  push:
    branches: [ master ]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    name: Lint (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [ '8.0', '8.5' ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer, cs2pr
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: PHP syntax + phpcs audit
        run: vendor/bin/phpcs -q --report=checkstyle --standard=phpcs.ruleset.xml . | cs2pr

  build:
    name: Build assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Build CSS & JS
        run: |
          npx sass ./src/scss/:./assets/css/ --load-path=node_modules/ --style=compressed --no-source-map
          npx webpack build --output-path ./assets/js --config ./webpack.config.js --mode production

      - name: Fail if the build changed committed assets
        run: |
          git diff --exit-code -- assets \
            || ( echo "::error::Built assets differ from committed ones. Run 'npm run build' and commit." && exit 1 )

  test:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.0', '8.5' ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: none

      - run: npm ci --ignore-scripts
      - run: composer install --no-interaction --no-progress --prefer-dist

      - name: Start wp-env (PHP ${{ matrix.php }})
        run: WP_ENV_PHP_VERSION=${{ matrix.php }} npx wp-env start

      - name: Run PHPUnit
        run: npm run test:phpunit

      - name: Stop wp-env
        if: always()
        run: npx wp-env stop
